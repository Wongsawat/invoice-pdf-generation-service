server:
  port: 8090

spring:
  application:
    name: invoice-pdf-generation-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:invoicepdf_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false

# Apache Camel
camel:
  springboot:
    name: invoice-pdf-generation-camel
    main-run-controller: true
  dataformat:
    jackson:
      auto-discover-object-mapper: true

# Application-specific configuration
app:
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      command-group-id: ${KAFKA_COMMAND_GROUP_ID:invoice-pdf-generation-command}
      compensation-group-id: ${KAFKA_COMPENSATION_GROUP_ID:invoice-pdf-generation-compensation}
      consumers-count: ${KAFKA_CONSUMERS_COUNT:3}
      max-poll-records: ${KAFKA_MAX_POLL_RECORDS:100}
      break-on-first-error: ${KAFKA_BREAK_ON_FIRST_ERROR:true}
    topics:
      saga-command-invoice-pdf: saga.command.invoice-pdf
      saga-compensation-invoice-pdf: saga.compensation.invoice-pdf
      saga-reply-invoice-pdf: saga.reply.invoice-pdf
      pdf-generated: pdf.generated.invoice
      dlq: pdf.generation.invoice.dlq
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9001}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket-name: ${MINIO_BUCKET_NAME:invoices}
    region: ${MINIO_REGION:us-east-1}
    base-url: ${MINIO_BASE_URL:http://localhost:9001/invoices}
    path-style-access: ${MINIO_PATH_STYLE_ACCESS:true}
  pdf:
    generation:
      max-retries: ${PDF_GENERATION_MAX_RETRIES:3}
      max-concurrent-renders: ${PDF_MAX_CONCURRENT_RENDERS:3}
  invoice:
    default-vat-rate: ${INVOICE_DEFAULT_VAT_RATE:7}
  rest-client:
    connect-timeout: ${REST_CLIENT_CONNECT_TIMEOUT:5000}
    read-timeout: ${REST_CLIENT_READ_TIMEOUT:10000}
    allowed-hosts: ${REST_CLIENT_ALLOWED_HOSTS:localhost}

# Eureka client configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,camelroutes
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

# Resilience4j circuit breaker for MinIO storage
resilience4j:
  circuitbreaker:
    instances:
      minio:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true

# Logging
logging:
  level:
    root: INFO
    com.wpanther.invoice.pdf: INFO
    org.apache.camel: INFO
    org.apache.camel.component.kafka: DEBUG
    org.apache.fop: INFO
    org.apache.pdfbox: INFO
