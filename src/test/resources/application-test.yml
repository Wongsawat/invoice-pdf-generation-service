spring:
  application:
    name: invoice-pdf-generation-service-test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  flyway:
    enabled: false

  jackson:
    serialization:
      write-dates-as-timestamps: false

# Apache Camel - disabled for unit tests
camel:
  springboot:
    name: invoice-pdf-generation-camel-test
    main-run-controller: false
  dataformat:
    jackson:
      auto-discover-object-mapper: true

# Application configuration for tests
app:
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: invoice-pdf-generation-service-test
      consumers-count: 1
      max-poll-records: 10
      break-on-first-error: true
    topics:
      saga-command-invoice-pdf: saga.command.invoice-pdf
      saga-compensation-invoice-pdf: saga.compensation.invoice-pdf
      saga-reply-invoice-pdf: saga.reply.invoice-pdf
      pdf-generated: pdf.generated.invoice
      pdf-signing-requested: pdf.signing.requested
      dlq: pdf.generation.invoice.dlq
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket-name: invoices-test
    region: us-east-1
    base-url: http://localhost:9000/invoices-test
    path-style-access: true
  pdf:
    generation:
      max-retries: 3
  rest-client:
    connect-timeout: 5000
    read-timeout: 30000

# Disable Eureka for tests
eureka:
  client:
    enabled: false

management:
  tracing:
    sampling:
      probability: 0.0  # no traces exported in tests

logging:
  level:
    root: WARN
    com.wpanther.invoice.pdf: DEBUG
    org.apache.camel: WARN
