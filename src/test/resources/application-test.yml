spring:
  application:
    name: invoice-pdf-generation-service-test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  flyway:
    enabled: false

# Apache Camel - disabled for unit tests
camel:
  springboot:
    name: invoice-pdf-generation-camel-test
    main-run-controller: false

# Application configuration for tests
app:
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: invoice-pdf-generation-service-test
    topics:
      xml-signed-invoice: xml.signed.invoice
      pdf-generated: pdf.generated
      pdf-signing-requested: pdf.signing.requested
      dlq: pdf.generation.invoice.dlq
  pdf:
    storage:
      path: /tmp/test-documents/invoices
      base-url: http://localhost:8084

# Disable Eureka for tests
eureka:
  client:
    enabled: false

logging:
  level:
    root: WARN
    com.wpanther.invoice.pdf: DEBUG
    org.apache.camel: WARN
